name: Prepare Draft Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: prepare-release-main
  cancel-in-progress: true

jobs:
  prepare-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release state
        id: state
        run: |
          previous_release_tag="$(
            gh release list --repo "$GH_REPO" --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName // ""'
          )"
          previous_release_version="${previous_release_tag#v}"
          managed_draft_tag="$(
            gh release list --repo "$GH_REPO" --limit 100 --json tagName,name,isDraft,isPrerelease \
              --jq '.[] | select(.isDraft and (.isPrerelease | not) and (.name | startswith("SM Sentinel "))) | .tagName' \
              | head -n1
          )"
          {
            echo "previous_release_tag=${previous_release_tag}"
            echo "previous_release_version=${previous_release_version:-0.0.0}"
            echo "managed_draft_tag=${managed_draft_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Classify merged pull request
        id: pr
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          case " $PR_LABELS " in
            *" release:major "*) echo "bump=major" >> "$GITHUB_OUTPUT" ;;
            *" release:minor "*) echo "bump=minor" >> "$GITHUB_OUTPUT" ;;
            *) echo "bump=patch" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Suggest release tag
        id: suggestion
        env:
          PREVIOUS_RELEASE_VERSION: ${{ steps.state.outputs.previous_release_version }}
          PR_BUMP: ${{ steps.pr.outputs.bump }}
          MANAGED_DRAFT_TAG: ${{ steps.state.outputs.managed_draft_tag }}
        run: |
          python3 - <<'PY'
          import os


          def parse_version(value: str) -> tuple[int, int, int]:
              parts = value.removeprefix("v").split(".")
              if len(parts) != 3:
                  raise ValueError(f"Expected SemVer major.minor.patch, got {value!r}")
              return tuple(int(part) for part in parts)


          previous = parse_version(os.environ["PREVIOUS_RELEASE_VERSION"])
          major, minor, patch = previous

          target = {
              "patch": (major, minor, patch + 1),
              "minor": (major, minor + 1, 0),
              "major": (major + 1, 0, 0),
          }[os.environ["PR_BUMP"]]

          managed_draft_tag = os.environ.get("MANAGED_DRAFT_TAG", "")
          if managed_draft_tag:
              target = max(target, parse_version(managed_draft_tag))

          effective_bump = (
              "major" if target[0] > previous[0] else
              "minor" if target[1] > previous[1] else
              "patch"
          )
          tag = f"v{target[0]}.{target[1]}.{target[2]}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"bump={effective_bump}\n")
              fh.write(f"tag={tag}\n")
          PY

      - name: Create draft release
        env:
          PREVIOUS_RELEASE_TAG: ${{ steps.state.outputs.previous_release_tag }}
          PR_BUMP: ${{ steps.pr.outputs.bump }}
          SUGGESTED_BUMP: ${{ steps.suggestion.outputs.bump }}
          SUGGESTED_TAG: ${{ steps.suggestion.outputs.tag }}
          MANAGED_DRAFT_TAG: ${{ steps.state.outputs.managed_draft_tag }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ -n "$MANAGED_DRAFT_TAG" ]; then
            gh release delete "$MANAGED_DRAFT_TAG" --repo "$GH_REPO" --yes
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$SUGGESTED_TAG" >/dev/null 2>&1; then
            echo "Release tag '$SUGGESTED_TAG' already exists outside the managed draft release." >&2
            exit 1
          fi

          args=(
            "$SUGGESTED_TAG"
            --repo "$GH_REPO"
            --draft
            --target "$TARGET_SHA"
            --title "SM Sentinel $SUGGESTED_TAG"
            --generate-notes
          )
          [ -z "$PREVIOUS_RELEASE_TAG" ] || args+=(--notes-start-tag "$PREVIOUS_RELEASE_TAG")
          gh release create "${args[@]}"

          {
            echo "Prepared draft release \`$SUGGESTED_TAG\`."
            echo
            echo "Suggested bump: \`$SUGGESTED_BUMP\`."
            echo
            echo "Merged pull request label bump: \`$PR_BUMP\`."
            echo
            echo "Review the draft release notes, then use GitHub's **Publish release** button to publish images."
          } >> "$GITHUB_STEP_SUMMARY"
