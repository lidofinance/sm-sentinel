name: Build and push SM Sentinel to staging

run-name: Build and push SM Sentinel:staging to staging

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  build-and-push:
    uses: lidofinance/actions/.github/workflows/k8s-build-push-harbor.yml@c7b5b6c5d8013046347d728d748fa741eb214e28
    with:
      tag: staging
      registry: registry.staging.k8s-staging.org
      registry_username: ${{ vars.REGISTRY_USERNAME }}
      image: team-csm/sm-sentinel
      environment: harbor_stage_release
    secrets:
      registry_token: ${{ secrets.HARBOR_STAGE_TOKEN }}
